<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Darts</title>
</head>

<body>
    <h1>Highest Grossing Movies by writer John B</h1>

    <button onclick="window.location.href='setup.html'">Back to setup</button>
    <button onclick="window.location.href='endScreen.html'">End game</button>

    <table class="scoreboard">
        <tr>
            <th>Player 1</th>
            <th>Player 2</th>
            <th>Player 3</th>
        </tr>
        <tr>
            <td>501</td>
            <td>501</td>
            <td>501</td>
        </tr>
    </table>

    <div>
        <p>Player 1's turn</p>

        <form class="guessInput">
            <label for="movie">Movie</label><br>
            <input type="text" id="movie" value="" list="movies" />

            <datalist id="movies">
                <option value="Apple"></option>
                <option value="Orange"></option>
                <option value="Peach"></option>
                <option value="Melon"></option>
                <option value="Strawberry"></option>
            </datalist>
            <input type="submit" value="Submit">
        </form>

        <button>Skip turn</button>
        <button>Drop out</button>
    </div>

    <div>
        <p>Movie scored 50 points</p>
        <p>Player 1 now has 501 points</p>
    </div>
</body>

<script src="game.js"></script>

</html>
